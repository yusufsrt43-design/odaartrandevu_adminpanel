<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-white">Etkinlik Başvuru Listesi</h1>
            <button id="refreshBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition duration-200 flex items-center gap-2">
                <span>🔄</span> Verileri Yenile
            </button>
        </div>

        <div id="loading" class="text-center py-8 text-xl text-gray-400">Veriler Google Sheets'ten çekiliyor...</div>

        <div class="bg-gray-850 border border-gray-700 rounded-lg overflow-hidden shadow-xl hidden" id="tableContainer">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-800 text-gray-300 border-b border-gray-700 uppercase text-sm font-semibold">
                        <th class="p-4">Sıra</th>
                        <th class="p-4">Adı Soyadı</th>
                        <th class="p-4">E-Posta</th>
                        <th class="p-4">Kayıt Tarihi</th>
                    </tr>
                </thead>
                <tbody id="dataRows" class="divide-y divide-gray-700 bg-gray-800/50">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Google Apps Script URL'niz
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwOsdn3mrjN-8X0B0y4x3TIBqVippQnv9vl5JAkZ3p9z4V2X6itrocBWhm-1VvAUZZ4QA/exec';
        
        const loadingDiv = document.getElementById('loading');
        const tableContainer = document.getElementById('tableContainer');
        const dataRows = document.getElementById('dataRows');
        const refreshBtn = document.getElementById('refreshBtn');

        function verileriGetir() {
            loadingDiv.classList.remove('hidden');
            tableContainer.classList.add('hidden');
            dataRows.innerHTML = ''; // Eski verileri temizle

            fetch(scriptURL) // GET isteği atıyoruz
                .then(res => res.json())
                .then(res => {
                    loadingDiv.classList.add('hidden');
                    
                    if(res.result === "success") {
                        tableContainer.classList.remove('hidden');
                        
                        if(res.data.length === 0) {
                            dataRows.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-400">Henüz hiç başvuru yok.</td></tr>`;
                            return;
                        }

                        // Gelen her satırı tabloya ekle
                        res.data.forEach((user, index) => {
                            const tr = document.createElement('tr');
                            tr.className = "hover:bg-gray-700/50 transition duration-150 text-gray-300";
                            tr.innerHTML = `
                                <td class="p-4 font-bold text-gray-500">${index + 1}</td>
                                <td class="p-4 font-medium text-white">${user.Ad_Soyad || '-'}</td>
                                <td class="p-4">${user.Email || '-'}</td>
                                <td class="p-4 text-sm text-gray-400">${user.Tarih || '-'}</td>
                            `;
                            dataRows.appendChild(tr);
                        });
                    } else {
                        loadingDiv.innerText = "Hata oluştu: " + res.error;
                    }
                })
                .catch(err => {
                    loadingDiv.innerText = "Bağlantı Hatası: Veriler alınamadı.";
                    console.error(err);
                });
        }

        // Sayfa ilk açıldığında verileri otomatik çek
        window.addEventListener('DOMContentLoaded', verileriGetir);
        // Butona basıldığında verileri manuel yenile
        refreshBtn.addEventListener('click', verileriGetir);
    </script>
</body>
</html>
